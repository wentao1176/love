<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>520 · 永恒告白</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    font-family:
        "Segoe UI",
        "PingFang SC",
        system-ui,
        sans-serif;

    background:
        linear-gradient(
            135deg,
            #ffccd5 0%,
            #ff8fab 45%,
            #fb6f92 100%
        );

    position:relative;
}

/* 背景爱心 */

.floating-hearts{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
}

.heart-bg{
    position:absolute;
    color:white;
    opacity:.5;
    animation:floatHeart linear forwards;
}

@keyframes floatHeart{
    0%{
        transform:
            translateY(110vh)
            scale(.6)
            rotate(0deg);
        opacity:0;
    }
    20%{
        opacity:.8;
    }
    100%{
        transform:
            translateY(-20vh)
            scale(1.2)
            rotate(360deg);
        opacity:0;
    }
}

/* 主卡片 */

.card{
    position:relative;
    z-index:10;

    width:100%;
    max-width:620px;

    padding:40px 28px;

    border-radius:48px;

    background:
        rgba(255,255,255,.82);

    backdrop-filter:blur(12px);

    box-shadow:
        0 20px 50px rgba(0,0,0,.15),
        0 0 0 6px rgba(255,255,255,.25);

    text-align:center;

    animation:cardFloat 3s ease-in-out infinite;
}

@keyframes cardFloat{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-6px);
    }
}

/* 标题 */

.big-heart{
    font-size:72px;
    animation:heartbeat 1.2s infinite;
    filter:drop-shadow(0 0 12px rgba(255,80,120,.4));
}

@keyframes heartbeat{
    0%,100%{
        transform:scale(1);
    }
    25%{
        transform:scale(1.12);
    }
    45%{
        transform:scale(1.22);
    }
    60%{
        transform:scale(1.1);
    }
}

.glow-520{
    margin-top:8px;

    font-size:74px;
    font-weight:900;

    letter-spacing:8px;

    background:
        linear-gradient(
            135deg,
            #ff4d6d,
            #ff758f
        );

    -webkit-background-clip:text;
    color:transparent;

    text-shadow:
        0 0 10px rgba(255,100,140,.25);
}

.sub-message{
    margin-top:8px;

    display:inline-block;

    padding:6px 18px;

    border-radius:999px;

    background:
        rgba(255,240,244,.8);

    color:#c9184a;

    font-weight:700;
}

/* 内容 */

.confession{
    margin-top:30px;

    color:#5b2d42;

    line-height:1.8;
}

.confession h2{
    font-size:2rem;
    margin-bottom:12px;
}

.confession p{
    font-size:1.12rem;
}

/* 按钮 */

.buttons{
    margin-top:36px;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:28px;

    min-height:80px;
}

.btn{
    border:none;
    cursor:pointer;

    padding:14px 34px;

    border-radius:999px;

    font-size:1.25rem;
    font-weight:700;

    transition:
        transform .25s ease,
        box-shadow .25s ease;
}

.btn:hover{
    transform:scale(1.05);
}

.btn-yes{
    background:
        linear-gradient(
            135deg,
            #ff4d88,
            #ff758f
        );

    color:white;

    box-shadow:
        0 10px 25px rgba(255,77,136,.35);
}

.btn-no{
    background:#f3d7df;
    color:#5c3748;

    /* 初始不加 fixed，等 JS 在 load 时捕获位置后再设置 */
    position:relative;

    z-index:50;

    transition:
        left .22s cubic-bezier(.34,1.56,.64,1),
        top .22s cubic-bezier(.34,1.56,.64,1),
        transform .15s ease;
}

.btn-no.fixed{
    position:fixed;
}

/* 拖尾小爱心 */

.trail-heart{
    position:fixed;
    pointer-events:none;
    z-index:49;
    font-size:20px;
    animation:trailFade .6s ease-out forwards;
}

@keyframes trailFade{
    0%{
        opacity:1;
        transform:scale(1) translateY(0);
    }
    100%{
        opacity:0;
        transform:scale(.3) translateY(-30px);
    }
}

/* 冲击波 */

.shockwave{
    position:fixed;
    pointer-events:none;
    z-index:9998;
    border-radius:50%;
    border:3px solid rgba(255,77,136,.6);
    animation:shockwaveExpand 1s ease-out forwards;
}

@keyframes shockwaveExpand{
    0%{
        width:20px;
        height:20px;
        opacity:1;
    }
    100%{
        width:800px;
        height:800px;
        opacity:0;
        margin-left:-400px;
        margin-top:-400px;
    }
}

/* 成功层 */

.success-overlay{
    position:fixed;
    inset:0;

    z-index:9999;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
        rgba(255,255,255,.18);

    backdrop-filter:blur(18px);

    animation:fadeIn .4s ease;
}

@keyframes fadeIn{
    from{ opacity:0; }
    to{ opacity:1; }
}

.success-card{
    width:min(90%,500px);

    padding:42px 28px;

    border-radius:42px;

    background:
        rgba(255,255,255,.9);

    text-align:center;

    box-shadow:
        0 25px 60px rgba(0,0,0,.18);

    animation:pop .45s ease;
}

@keyframes pop{
    0%{
        transform:scale(.8);
        opacity:0;
    }
    100%{
        transform:scale(1);
        opacity:1;
    }
}

.success-card h1{
    color:#ff4d88;
    font-size:2.4rem;
    margin-bottom:18px;
}

.success-card p{
    color:#7a3751;
    font-size:1.2rem;
    line-height:1.8;
}

.final-heart{
    font-size:64px;
    margin-bottom:12px;
    animation:heartbeat 1s infinite;
}

.close-btn{
    margin-top:26px;

    border:none;

    background:
        linear-gradient(
            135deg,
            #ff4d88,
            #ff758f
        );

    color:white;

    padding:12px 28px;

    border-radius:999px;

    font-size:1rem;
    font-weight:700;

    cursor:pointer;
}

/* 终极爱心爆炸粒子 */

.final-heart-particle{
    position:fixed;
    pointer-events:none;
    z-index:10000;
    animation:finalHeartBurst 3s ease-out forwards;
}

@keyframes finalHeartBurst{
    0%{
        opacity:1;
        transform:translate(0,0) scale(1) rotate(0deg);
    }
    100%{
        opacity:0;
        transform:translate(var(--tx),var(--ty)) scale(.4) rotate(var(--tr));
    }
}

@media(max-width:600px){

    .card{
        padding:32px 20px;
        border-radius:36px;
    }

    .glow-520{
        font-size:54px;
    }

    .big-heart{
        font-size:60px;
    }

    .confession h2{
        font-size:1.5rem;
    }

    .btn{
        font-size:1rem;
        padding:12px 24px;
    }
}
</style>
</head>

<body>

<div class="floating-hearts" id="floatingHearts"></div>

<div class="card" id="mainCard">

    <div class="big-heart">💖</div>

    <div class="glow-520">
        5 2 0
    </div>

    <div class="sub-message">
        ✨ 告白日 ✨
    </div>

    <div class="confession">
        <h2>
            💌 我喜欢你 💌
        </h2>

        <p>
            从遇见你的那天起，
            我的世界开始闪闪发光。<br>
            往后余生，
            我想一直陪在你身边 ❤️
        </p>
    </div>

    <div class="buttons">
        <button
            class="btn btn-yes"
            id="yesBtn">
            💖 我愿意 💖
        </button>

        <button
            class="btn btn-no"
            id="noBtn">
            🙅 不要嘛 🙅
        </button>
    </div>

    <div class="hint">
        点"不要嘛"它会害羞逃跑～
    </div>

</div>

<script>

(() => {

    const floatingHearts =
        document.getElementById('floatingHearts');

    const yesBtn =
        document.getElementById('yesBtn');

    const noBtn =
        document.getElementById('noBtn');

    const mainCard =
        document.getElementById('mainCard');

    let confirmed = false;
    let noFixed = false;

    /* =======================
       背景漂浮爱心
    ======================= */

    const emojis = [
        '❤️',
        '💖',
        '💕',
        '💗',
        '✨'
    ];

    function createHeart(){
        const heart =
            document.createElement('div');
        heart.className = 'heart-bg';
        heart.innerHTML =
            emojis[
                Math.floor(
                    Math.random()*emojis.length
                )
            ];
        heart.style.left =
            Math.random()*100 + 'vw';
        heart.style.fontSize =
            (14 + Math.random()*20) + 'px';
        heart.style.animationDuration =
            (6 + Math.random()*6) + 's';
        floatingHearts.appendChild(heart);
        setTimeout(() => {
            heart.remove();
        },12000);
    }

    for(let i=0;i<25;i++){
        setTimeout(createHeart,i*200);
    }

    setInterval(createHeart,1400);

    /* =======================
       初始化 NO 按钮位置
       先让它在 flex 流中自然渲染，
       再用 getBoundingClientRect 捕获精确位置后 fixed
    ======================= */

    function initNoPosition(){
        if(noFixed) return;
        const rect = noBtn.getBoundingClientRect();
        noBtn.style.left = rect.left + 'px';
        noBtn.style.top = rect.top + 'px';
        noBtn.style.width = rect.width + 'px';
        noBtn.classList.add('fixed');
        noFixed = true;
    }

    window.addEventListener('load', initNoPosition);

    // 窗口大小变化时重新校准
    let resizeDebounce;
    window.addEventListener('resize', () => {
        clearTimeout(resizeDebounce);
        resizeDebounce = setTimeout(() => {
            if(confirmed || !noFixed) return;
            // 保持在屏幕内
            const btnW = noBtn.offsetWidth;
            const btnH = noBtn.offsetHeight;
            const maxX = window.innerWidth - btnW - 10;
            const maxY = window.innerHeight - btnH - 10;
            let x = parseFloat(noBtn.style.left) || 0;
            let y = parseFloat(noBtn.style.top) || 0;
            x = Math.max(10, Math.min(maxX, x));
            y = Math.max(10, Math.min(maxY, y));
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }, 300);
    });

    /* =======================
       NO 按钮逃跑（炫酷版）
    ======================= */

    function spawnTrailHeart(x, y){
        const h = document.createElement('div');
        h.className = 'trail-heart';
        h.innerHTML = ['💕','💖','✨','💗','❤️'][Math.floor(Math.random()*5)];
        h.style.left = x + 'px';
        h.style.top = y + 'px';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 700);
    }

    function moveNoBtn(){
        if(confirmed) return;

        if(!noFixed){
            initNoPosition();
        }

        const btnW = noBtn.offsetWidth;
        const btnH = noBtn.offsetHeight;
        const padding = 10;

        const maxX = window.innerWidth - btnW - padding;
        const maxY = window.innerHeight - btnH - padding;

        const currentX = parseFloat(noBtn.style.left) || 0;
        const currentY = parseFloat(noBtn.style.top) || 0;

        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;

        // 更大幅度的逃跑距离
        const escapeDist = 120 + Math.random() * 200;
        const randomAngle = Math.random() * Math.PI * 2;

        let newX = currentX + Math.cos(randomAngle) * escapeDist;
        let newY = currentY + Math.sin(randomAngle) * escapeDist;

        // 如果跑到了屏幕外，弹回反向
        if(newX < padding || newX > maxX){
            newX = currentX - Math.cos(randomAngle) * escapeDist;
        }
        if(newY < padding || newY > maxY){
            newY = currentY - Math.sin(randomAngle) * escapeDist;
        }

        newX = Math.max(padding, Math.min(maxX, newX));
        newY = Math.max(padding, Math.min(maxY, newY));

        // 生成拖尾爱心（在旧位置）
        const cx = currentX + btnW/2;
        const cy = currentY + btnH/2;
        for(let i=0;i<4;i++){
            setTimeout(() => {
                spawnTrailHeart(
                    cx + (Math.random()-0.5)*40,
                    cy + (Math.random()-0.5)*30
                );
            }, i*40);
        }

        // 随机旋转角度
        const rotateDeg = (Math.random() - 0.5) * 50;

        noBtn.style.left = newX + 'px';
        noBtn.style.top = newY + 'px';
        noBtn.style.transform = `scale(1.15) rotate(${rotateDeg}deg)`;

        setTimeout(() => {
            if(!confirmed){
                noBtn.style.transform = 'scale(1) rotate(0deg)';
            }
        }, 220);

        const texts = [
            '抓不到~',
            '略略略~',
            '不可以！',
            '跑啦~',
            '点空啦~',
            '嘿嘿~',
            '再试一次~'
        ];

        if(Math.random() > 0.4){
            noBtn.innerText =
                texts[Math.floor(Math.random()*texts.length)];
            setTimeout(() => {
                if(!confirmed){
                    noBtn.innerText = '🙅 不要嘛 🙅';
                }
            }, 500);
        }

        if(navigator.vibrate){
            navigator.vibrate([10, 30, 10]);
        }
    }

    noBtn.addEventListener('mouseenter', moveNoBtn);
    noBtn.addEventListener('touchstart', e => {
        e.preventDefault();
        moveNoBtn();
    }, {passive:false});

    /* =======================
       YES 特效（震撼升级版）
    ======================= */

    function launchLoveEffects(){

        // 屏幕闪光
        const flash = document.createElement('div');
        flash.style.cssText = `
            position:fixed;inset:0;z-index:9997;
            background:rgba(255,255,255,.5);
            pointer-events:none;
            animation:flashFade .5s ease-out forwards;
        `;
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 600);

        // 注入 flash 动画
        if(!document.getElementById('flashStyle')){
            const s = document.createElement('style');
            s.id = 'flashStyle';
            s.innerHTML = '@keyframes flashFade{0%{opacity:1}100%{opacity:0}}';
            document.head.appendChild(s);
        }

        // 卡牌弹跳
        mainCard.animate([
            { transform:'scale(1) translateY(0)' },
            { transform:'scale(1.06) translateY(-12px)' },
            { transform:'scale(.97) translateY(2px)' },
            { transform:'scale(1.02) translateY(-4px)' },
            { transform:'scale(1) translateY(0)' }
        ], {
            duration:800,
            easing:'cubic-bezier(.22,1,.36,1)'
        });

        // 冲击波（从卡牌中心扩散）
        const cardRect = mainCard.getBoundingClientRect();
        const cx = cardRect.left + cardRect.width/2;
        const cy = cardRect.top + cardRect.height/2;
        for(let i=0;i<3;i++){
            setTimeout(() => {
                const wave = document.createElement('div');
                wave.className = 'shockwave';
                wave.style.left = cx + 'px';
                wave.style.top = cy + 'px';
                wave.style.width = '20px';
                wave.style.height = '20px';
                wave.style.marginLeft = '-10px';
                wave.style.marginTop = '-10px';
                wave.style.borderColor =
                    ['rgba(255,77,136,.7)','rgba(255,133,161,.5)','rgba(255,200,210,.4)'][i];
                wave.style.animationDuration = (1 + i*0.3) + 's';
                wave.style.animationDelay = (i*0.15) + 's';
                document.body.appendChild(wave);
                setTimeout(() => wave.remove(), 2000);
            }, i*120);
        }

        // 第一波：中心爱心爆发
        canvasConfetti({
            particleCount:200,
            spread:100,
            startVelocity:35,
            origin:{ x:.5, y:.55 },
            scalar:1.3,
            colors:[
                '#ff4d88','#ff85a1','#ffd1dc','#fff0f5',
                '#ffb3c6','#ff0a54','#ff7096'
            ],
            shapes:['heart']
        });

        // 第二波：稍延迟，从侧面喷射
        setTimeout(() => {
            canvasConfetti({
                particleCount:120,
                angle:50,
                spread:60,
                origin:{ x:0, y:.65 },
                startVelocity:40,
                scalar:1.1,
                colors:['#ffb3c6','#ff8fab','#ffe5ec','#ff7096']
            });
            canvasConfetti({
                particleCount:120,
                angle:130,
                spread:60,
                origin:{ x:1, y:.65 },
                startVelocity:40,
                scalar:1.1,
                colors:['#ffb3c6','#ff8fab','#ffe5ec','#ff7096']
            });
        }, 200);

        // 第三波：从上方洒落
        setTimeout(() => {
            canvasConfetti({
                particleCount:100,
                angle:90,
                spread:120,
                origin:{ x:.5, y:.3 },
                startVelocity:25,
                scalar:1,
                colors:['#ffd1dc','#ffe5ec','#fff0f5','#ffb3c6'],
                shapes:['heart','circle']
            });
        }, 450);

        // 第四波：全屏金色闪闪
        setTimeout(() => {
            canvasConfetti({
                particleCount:80,
                spread:360,
                startVelocity:20,
                origin:{ x:.5, y:.5 },
                scalar:.9,
                colors:['#ffd700','#ffb347','#ffe5b4','#fff8dc'],
                shapes:['star']
            });
        }, 700);

        // 爱心雨 - 更密集
        for(let i=0;i<80;i++){
            setTimeout(() => {
                const heart = document.createElement('div');
                heart.innerHTML = ['💖','💕','💗','❤️','✨','💝'][Math.floor(Math.random()*6)];
                heart.style.cssText = `
                    position:fixed;
                    left:${Math.random()*100}vw;
                    top:-50px;
                    font-size:${16 + Math.random()*26}px;
                    opacity:1;
                    pointer-events:none;
                    z-index:10000;
                `;
                document.body.appendChild(heart);

                const duration = 3 + Math.random()*3;
                const tx = (Math.random()-0.5)*120;
                const rot = (Math.random()-0.5)*360;

                heart.animate([
                    { transform:`translateY(0) translateX(0) rotate(0deg)`, opacity:1 },
                    { transform:`translateY(${window.innerHeight+80}px) translateX(${tx}px) rotate(${rot}deg)`, opacity:0 }
                ], {
                    duration: duration*1000,
                    easing:'cubic-bezier(.4,0,1,1)'
                });

                setTimeout(() => heart.remove(), duration*1000+200);
            }, i*80);
        }
    }

    /* =======================
       成功弹窗
    ======================= */

    function showSuccess(){
        if(confirmed) return;
        confirmed = true;

        launchLoveEffects();

        // 爆炸大爱心粒子
        setTimeout(() => {
            const cardRect = mainCard.getBoundingClientRect();
            const cx = cardRect.left + cardRect.width/2;
            const cy = cardRect.top + cardRect.height/2;
            const heartEmojis = ['💖','💕','💗','❤️','💝','💘','💓'];
            for(let i=0;i<30;i++){
                const p = document.createElement('div');
                p.className = 'final-heart-particle';
                p.innerHTML = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
                p.style.left = cx + 'px';
                p.style.top = cy + 'px';
                p.style.fontSize = (20 + Math.random()*30) + 'px';
                const angle = Math.random()*Math.PI*2;
                const dist = 100 + Math.random()*250;
                p.style.setProperty('--tx', Math.cos(angle)*dist + 'px');
                p.style.setProperty('--ty', Math.sin(angle)*dist - 80 + 'px');
                p.style.setProperty('--tr', (Math.random()-0.5)*720 + 'deg');
                p.style.animationDuration = (2 + Math.random()*2) + 's';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 4000);
            }
        }, 300);

        // 延迟显示弹窗
        setTimeout(() => {
            const overlay = document.createElement('div');
            overlay.className = 'success-overlay';

            overlay.innerHTML = `
                <div class="success-card">
                    <div class="final-heart">💖</div>
                    <h1>我们在一起啦</h1>
                    <p>✨ 520 快乐 ✨</p>
                    <p>
                        从今天开始，<br>
                        每一个日落与晚风，<br>
                        我都想陪你一起看 ❤️
                    </p>
                    <button class="close-btn">💕 珍藏此刻 💕</button>
                </div>
            `;

            document.body.appendChild(overlay);

            overlay
                .querySelector('.close-btn')
                .addEventListener('click',() => {
                    overlay.remove();
                    yesBtn.disabled = true;
                    noBtn.disabled = true;
                    yesBtn.innerHTML = '❤️ 永远爱你 ❤️';
                    noBtn.innerHTML = '💕 永远甜蜜 💕';

                    // 如果还没 fixed，先初始化
                    if(!noFixed) initNoPosition();

                    noBtn.style.position = 'fixed';
                    noBtn.style.left = '50%';
                    noBtn.style.top = 'auto';
                    noBtn.style.bottom = '60px';
                    noBtn.style.transform = 'translateX(-50%)';
                });
        }, 500);
    }

    yesBtn.addEventListener('click', showSuccess);
    yesBtn.addEventListener('touchstart', e => {
        e.preventDefault();
        showSuccess();
    }, {passive:false});

})();
</script>

</body>
</html>
