<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>520 · 永恒告白</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    font-family:
        "Segoe UI",
        "PingFang SC",
        system-ui,
        sans-serif;

    background:
        linear-gradient(
            135deg,
            #ffccd5 0%,
            #ff8fab 45%,
            #fb6f92 100%
        );

    position:relative;
}

/* 背景爱心 */

.floating-hearts{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
}

.heart-bg{
    position:absolute;
    color:white;
    opacity:.5;
    animation:floatHeart linear forwards;
}

@keyframes floatHeart{
    0%{
        transform:
            translateY(110vh)
            scale(.6)
            rotate(0deg);

        opacity:0;
    }

    20%{
        opacity:.8;
    }

    100%{
        transform:
            translateY(-20vh)
            scale(1.2)
            rotate(360deg);

        opacity:0;
    }
}

/* 主卡片 */

.card{
    position:relative;
    z-index:10;

    width:100%;
    max-width:620px;

    padding:40px 28px;

    border-radius:48px;

    background:
        rgba(255,255,255,.82);

    backdrop-filter:blur(12px);

    box-shadow:
        0 20px 50px rgba(0,0,0,.15),
        0 0 0 6px rgba(255,255,255,.25);

    text-align:center;

    animation:cardFloat 3s ease-in-out infinite;
}

@keyframes cardFloat{
    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-6px);
    }
}

/* 标题 */

.big-heart{
    font-size:72px;
    animation:heartbeat 1.2s infinite;
    filter:drop-shadow(0 0 12px rgba(255,80,120,.4));
}

@keyframes heartbeat{
    0%,100%{
        transform:scale(1);
    }

    25%{
        transform:scale(1.12);
    }

    45%{
        transform:scale(1.22);
    }

    60%{
        transform:scale(1.1);
    }
}

.glow-520{
    margin-top:8px;

    font-size:74px;
    font-weight:900;

    letter-spacing:8px;

    background:
        linear-gradient(
            135deg,
            #ff4d6d,
            #ff758f
        );

    -webkit-background-clip:text;
    color:transparent;

    text-shadow:
        0 0 10px rgba(255,100,140,.25);
}

.sub-message{
    margin-top:8px;

    display:inline-block;

    padding:6px 18px;

    border-radius:999px;

    background:
        rgba(255,240,244,.8);

    color:#c9184a;

    font-weight:700;
}

/* 内容 */

.confession{
    margin-top:30px;

    color:#5b2d42;

    line-height:1.8;
}

.confession h2{
    font-size:2rem;
    margin-bottom:12px;
}

.confession p{
    font-size:1.12rem;
}

/* 按钮 */

.buttons{
    margin-top:36px;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:28px;

    min-height:80px;
}

.btn{
    border:none;
    cursor:pointer;

    padding:14px 34px;

    border-radius:999px;

    font-size:1.25rem;
    font-weight:700;

    transition:
        transform .25s ease,
        box-shadow .25s ease;
}

.btn:hover{
    transform:scale(1.05);
}

.btn-yes{
    background:
        linear-gradient(
            135deg,
            #ff4d88,
            #ff758f
        );

    color:white;

    box-shadow:
        0 10px 25px rgba(255,77,136,.35);
}

.btn-no{
    background:#f3d7df;
    color:#5c3748;

    position:fixed;

    z-index:50;

    transition:
        left .28s cubic-bezier(.22,1,.36,1),
        top .28s cubic-bezier(.22,1,.36,1),
        transform .2s ease;
}

/* 提示 */

.hint{
    margin-top:28px;

    color:#b94b73;

    font-size:.92rem;
}

/* 成功层 */

.success-overlay{
    position:fixed;
    inset:0;

    z-index:9999;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
        rgba(255,255,255,.18);

    backdrop-filter:blur(18px);

    animation:fadeIn .4s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
    }

    to{
        opacity:1;
    }
}

.success-card{
    width:min(90%,500px);

    padding:42px 28px;

    border-radius:42px;

    background:
        rgba(255,255,255,.9);

    text-align:center;

    box-shadow:
        0 25px 60px rgba(0,0,0,.18);

    animation:pop .45s ease;
}

@keyframes pop{
    0%{
        transform:scale(.8);
        opacity:0;
    }

    100%{
        transform:scale(1);
        opacity:1;
    }
}

.success-card h1{
    color:#ff4d88;
    font-size:2.4rem;
    margin-bottom:18px;
}

.success-card p{
    color:#7a3751;
    font-size:1.2rem;
    line-height:1.8;
}

.final-heart{
    font-size:64px;
    margin-bottom:12px;
    animation:heartbeat 1s infinite;
}

.close-btn{
    margin-top:26px;

    border:none;

    background:
        linear-gradient(
            135deg,
            #ff4d88,
            #ff758f
        );

    color:white;

    padding:12px 28px;

    border-radius:999px;

    font-size:1rem;
    font-weight:700;

    cursor:pointer;
}

@media(max-width:600px){

    .card{
        padding:32px 20px;
        border-radius:36px;
    }

    .glow-520{
        font-size:54px;
    }

    .big-heart{
        font-size:60px;
    }

    .confession h2{
        font-size:1.5rem;
    }

    .btn{
        font-size:1rem;
        padding:12px 24px;
    }
}
</style>
</head>

<body>

<div class="floating-hearts" id="floatingHearts"></div>

<div class="card" id="mainCard">

    <div class="big-heart">💖</div>

    <div class="glow-520">
        5 2 0
    </div>

    <div class="sub-message">
        ✨ 告白日 ✨
    </div>

    <div class="confession">
        <h2>
            💌 我喜欢你 💌
        </h2>

        <p>
            从遇见你的那天起，
            我的世界开始闪闪发光。<br>
            往后余生，
            我想一直陪在你身边 ❤️
        </p>
    </div>

    <div class="buttons">
        <button
            class="btn btn-yes"
            id="yesBtn">
            💖 我愿意 💖
        </button>

        <button
            class="btn btn-no"
            id="noBtn">
            🙅 不要嘛 🙅
        </button>
    </div>

    <div class="hint">
        点“不要嘛”它会害羞逃跑～
    </div>

</div>

<script>

(() => {

    const floatingHearts =
        document.getElementById('floatingHearts');

    const yesBtn =
        document.getElementById('yesBtn');

    const noBtn =
        document.getElementById('noBtn');

    const mainCard =
        document.getElementById('mainCard');

    let confirmed = false;

    /* =======================
       背景漂浮爱心
    ======================= */

    const emojis = [
        '❤️',
        '💖',
        '💕',
        '💗',
        '✨'
    ];

    function createHeart(){

        const heart =
            document.createElement('div');

        heart.className =
            'heart-bg';

        heart.innerHTML =
            emojis[
                Math.floor(
                    Math.random()*emojis.length
                )
            ];

        heart.style.left =
            Math.random()*100 + 'vw';

        heart.style.fontSize =
            (14 + Math.random()*20) + 'px';

        heart.style.animationDuration =
            (6 + Math.random()*6) + 's';

        floatingHearts.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        },12000);
    }

    for(let i=0;i<25;i++){
        setTimeout(createHeart,i*200);
    }

    setInterval(createHeart,1400);

    /* =======================
       初始化 NO 按钮位置
    ======================= */

    function initNoPosition(){

        const rect =
            noBtn.getBoundingClientRect();

        noBtn.style.left =
            rect.left + 'px';

        noBtn.style.top =
            rect.top + 'px';
    }

    window.addEventListener(
        'load',
        initNoPosition
    );

    /* =======================
       NO 按钮逃跑
    ======================= */

    function moveNoBtn(){

        if(confirmed) return;

        const btnW =
            noBtn.offsetWidth;

        const btnH =
            noBtn.offsetHeight;

        const padding = 10;

        const maxX =
            window.innerWidth
            - btnW
            - padding;

        const maxY =
            window.innerHeight
            - btnH
            - padding;

        const currentX =
            parseFloat(noBtn.style.left) || 0;

        const currentY =
            parseFloat(noBtn.style.top) || 0;

        const centerX =
            window.innerWidth / 2;

        const centerY =
            window.innerHeight / 2;

        let dx =
            currentX < centerX
            ? Math.random()*180
            : -Math.random()*180;

        let dy =
            currentY < centerY
            ? Math.random()*140
            : -Math.random()*140;

        let newX = currentX + dx;
        let newY = currentY + dy;

        newX =
            Math.max(
                padding,
                Math.min(maxX,newX)
            );

        newY =
            Math.max(
                padding,
                Math.min(maxY,newY)
            );

        noBtn.style.left =
            newX + 'px';

        noBtn.style.top =
            newY + 'px';

        noBtn.style.transform =
            'scale(1.08)';

        setTimeout(() => {
            if(!confirmed){
                noBtn.style.transform =
                    'scale(1)';
            }
        },180);

        const texts = [
            '抓不到~',
            '略略略~',
            '不可以！',
            '跑啦~',
            '点空啦~'
        ];

        if(Math.random() > 0.5){

            noBtn.innerText =
                texts[
                    Math.floor(
                        Math.random()*texts.length
                    )
                ];

            setTimeout(() => {

                if(!confirmed){

                    noBtn.innerText =
                        '🙅 不要嘛 🙅';
                }

            },600);
        }

        if(navigator.vibrate){
            navigator.vibrate(15);
        }
    }

    noBtn.addEventListener(
        'mouseenter',
        moveNoBtn
    );

    noBtn.addEventListener(
        'touchstart',
        e => {

            e.preventDefault();

            moveNoBtn();
        },
        {passive:false}
    );

    /* =======================
       YES 特效
    ======================= */

    function launchLoveEffects(){

        document.body.animate(
            [
                {
                    filter:'brightness(1)'
                },
                {
                    filter:'brightness(1.15)'
                },
                {
                    filter:'brightness(1)'
                }
            ],
            {
                duration:1200
            }
        );

        mainCard.animate(
            [
                {
                    transform:'scale(1)'
                },
                {
                    transform:
                        'scale(1.04) translateY(-8px)'
                },
                {
                    transform:'scale(1)'
                }
            ],
            {
                duration:1000,
                easing:'ease-out'
            }
        );

        /* 中心心形爆发 */

        canvasConfetti({

            particleCount:160,

            spread:90,

            startVelocity:28,

            origin:{
                x:.5,
                y:.6
            },

            scalar:1.2,

            colors:[
                '#ff4d88',
                '#ff85a1',
                '#ffd1dc',
                '#fff0f5'
            ],

            shapes:['heart']
        });

        /* 两边柔和彩带 */

        setTimeout(() => {

            canvasConfetti({

                particleCount:80,

                angle:60,

                spread:55,

                origin:{
                    x:0,
                    y:.7
                },

                colors:[
                    '#ffb3c6',
                    '#ff8fab',
                    '#ffe5ec'
                ]
            });

            canvasConfetti({

                particleCount:80,

                angle:120,

                spread:55,

                origin:{
                    x:1,
                    y:.7
                },

                colors:[
                    '#ffb3c6',
                    '#ff8fab',
                    '#ffe5ec'
                ]
            });

        },250);

        /* 爱心雨 */

        for(let i=0;i<50;i++){

            setTimeout(() => {

                const heart =
                    document.createElement('div');

                heart.innerHTML = '💖';

                heart.style.position = 'fixed';

                heart.style.left =
                    Math.random()*100 + 'vw';

                heart.style.top = '-40px';

                heart.style.fontSize =
                    (18 + Math.random()*20) + 'px';

                heart.style.opacity = '.9';

                heart.style.pointerEvents = 'none';

                heart.style.zIndex = '9999';

                heart.style.transition =
                    'transform 4s linear, opacity 4s';

                document.body.appendChild(heart);

                requestAnimationFrame(() => {

                    heart.style.transform =
                        `translateY(${window.innerHeight + 80}px)
                         rotate(${Math.random()*360}deg)`;

                    heart.style.opacity = '0';
                });

                setTimeout(() => {
                    heart.remove();
                },4000);

            },i*120);
        }
    }

    /* =======================
       成功弹窗
    ======================= */

    function showSuccess(){

        if(confirmed) return;

        confirmed = true;

        launchLoveEffects();

        const overlay =
            document.createElement('div');

        overlay.className =
            'success-overlay';

        overlay.innerHTML = `
            <div class="success-card">

                <div class="final-heart">
                    💖
                </div>

                <h1>
                    我们在一起啦
                </h1>

                <p>
                    ✨ 520 快乐 ✨
                </p>

                <p>
                    从今天开始，
                    每一个日落与晚风，
                    我都想陪你一起看 ❤️
                </p>

                <button class="close-btn">
                    💕 珍藏此刻 💕
                </button>

            </div>
        `;

        document.body.appendChild(overlay);

        overlay
            .querySelector('.close-btn')
            .addEventListener('click',() => {

                overlay.remove();

                yesBtn.disabled = true;
                noBtn.disabled = true;

                yesBtn.innerHTML =
                    '❤️ 永远爱你 ❤️';

                noBtn.innerHTML =
                    '💕 永远甜蜜 💕';

                noBtn.style.left =
                    '50%';

                noBtn.style.top =
                    'calc(50% + 80px)';

                noBtn.style.transform =
                    'translateX(-50%)';
            });
    }

    yesBtn.addEventListener(
        'click',
        showSuccess
    );

    yesBtn.addEventListener(
        'touchstart',
        e => {

            e.preventDefault();

            showSuccess();
        },
        {passive:false}
    );

})();
</script>

</body>
</html>
