<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>520 · 永恒告白 | 我爱你</title>
    <!-- canvas-confetti 彩带库 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffb6c1 0%, #ff85a1 30%, #ff5e7e 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Poppins', 'Dancing Script', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            cursor: default;
        }

        /* 漂浮爱心背景 */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart-bg {
            position: absolute;
            font-size: 1.2rem;
            opacity: 0.5;
            animation: floatHeart linear infinite;
            color: #fff3f5;
            text-shadow: 0 0 5px rgba(255, 80, 120, 0.5);
            pointer-events: none;
        }

        @keyframes floatHeart {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0.6; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        /* 主卡片 */
        .card {
            position: relative;
            z-index: 10;
            max-width: 620px;
            width: 100%;
            background: rgba(255, 248, 245, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 68px 68px 72px 72px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.2), 0 0 0 8px rgba(255, 220, 220, 0.6), 0 0 0 12px rgba(255, 140, 160, 0.3);
            text-align: center;
            padding: 30px 28px 48px;
            transition: all 0.3s ease;
            animation: cardGlow 2s infinite alternate;
        }

        @keyframes cardGlow {
            0% { box-shadow: 0 30px 45px rgba(0, 0, 0, 0.2), 0 0 0 8px rgba(255, 220, 220, 0.6), 0 0 0 12px rgba(255, 140, 160, 0.3); }
            100% { box-shadow: 0 35px 55px rgba(0, 0, 0, 0.25), 0 0 0 10px rgba(255, 200, 200, 0.9), 0 0 0 16px rgba(255, 100, 130, 0.5); }
        }

        .card-shake {
            animation: cardShake 0.2s ease-in-out 0s 2;
        }

        @keyframes cardShake {
            0% { transform: translateX(0px); }
            25% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0px); }
        }

        .love-header {
            margin-bottom: 20px;
            position: relative;
        }

        .big-heart {
            font-size: 85px;
            display: inline-block;
            animation: heartbeat 1.2s infinite ease-in-out;
            filter: drop-shadow(0 8px 18px rgba(220, 60, 80, 0.4));
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.2); text-shadow: 0 0 15px #ff3366; }
            35% { transform: scale(1.1); }
            45% { transform: scale(1.25); }
            55% { transform: scale(1.1); }
        }

        .glow-520 {
            font-size: 80px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 8px;
            text-shadow: 0 4px 15px rgba(255, 80, 100, 0.3);
            margin: 10px 0 5px;
            animation: textGlow 1.5s infinite alternate;
        }

        @keyframes textGlow {
            from { text-shadow: 0 0 5px #ff99aa; }
            to { text-shadow: 0 0 20px #ff3355, 0 0 5px #ff9999; }
        }

        .sub-message {
            font-size: 1.2rem;
            font-weight: 600;
            color: #b13e5a;
            background: rgba(255, 220, 210, 0.6);
            display: inline-block;
            padding: 5px 18px;
            border-radius: 60px;
            backdrop-filter: blur(2px);
        }

        .confession-text {
            margin: 28px 0 20px;
            font-size: 1.65rem;
            line-height: 1.4;
            font-weight: 600;
            color: #4a2c34;
        }

        .confession-text p {
            background: linear-gradient(120deg, #ffe6e9, #fff0f2);
            display: inline;
            padding: 0 12px;
            border-radius: 50px;
            box-decoration-break: clone;
            -webkit-box-decoration-break: clone;
        }

        .name-tag {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff3b6f;
            display: inline-block;
            margin: 8px 0;
            text-shadow: 2px 2px 10px rgba(255, 100, 130, 0.4);
        }

        .buttons-area {
            margin: 35px 0 15px;
            display: flex;
            justify-content: center;
            gap: 35px;
            flex-wrap: wrap;
            position: relative;
            min-height: 100px;
        }

        .btn {
            border: none;
            font-size: 1.6rem;
            font-weight: bold;
            padding: 12px 32px;
            border-radius: 56px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.1);
            font-family: inherit;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            will-change: transform;
        }

        .btn-yes {
            background: #ff5c8a;
            color: white;
            border: 2px solid #fff0f0;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .btn-yes:hover {
            background: #ff3366;
            transform: scale(1.05);
        }

        .yes-excited {
            animation: yesJump 0.3s ease 0s 2;
        }

        @keyframes yesJump {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); background: #ff3366; box-shadow: 0 0 20px #ff6699; }
            100% { transform: scale(1); }
        }

        .btn-no {
            background: #d9c7cd;
            color: #4b2e38;
            border: 2px solid #fce4ea;
            transition: transform 0.22s cubic-bezier(0.2, 1.1, 0.4, 1);
            position: relative;
        }

        /* 成功覆盖层 */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            animation: fadeIn 0.4s;
        }

        .success-card {
            background: linear-gradient(145deg, #fff2f5, #ffe0e8);
            border-radius: 70px;
            padding: 40px 30px;
            text-align: center;
            max-width: 90%;
            width: 500px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.3);
            border: 3px solid white;
            animation: bouncePop 0.5s;
        }

        .success-card h1 {
            font-size: 3rem;
            color: #ff3366;
            margin-bottom: 20px;
        }

        .success-card p {
            font-size: 1.6rem;
            font-weight: 500;
            color: #902d47;
            margin: 15px 0;
        }

        .success-card .final-heart {
            font-size: 70px;
            animation: heartbeat 0.8s infinite;
        }

        .close-success {
            margin-top: 28px;
            background: #ff5c8a;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes bouncePop {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .hint-text {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #c0607a;
            background: rgba(255, 245, 240, 0.7);
            border-radius: 50px;
            padding: 6px 16px;
            display: inline-block;
        }

        /* 临时闪光特效 */
        .white-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            transition: opacity 0.1s ease;
        }

        /* 爱心雨 */
        .rain-heart {
            position: fixed;
            font-size: 20px;
            pointer-events: none;
            z-index: 9999;
            animation: fallDown 1.5s linear forwards;
        }

        @keyframes fallDown {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        @media (max-width: 550px) {
            .card { padding: 20px 18px 35px; border-radius: 48px; }
            .glow-520 { font-size: 58px; letter-spacing: 4px; }
            .confession-text { font-size: 1.3rem; }
            .btn { font-size: 1.25rem; padding: 10px 22px; }
            .buttons-area { gap: 20px; }
            .big-heart { font-size: 65px; }
            .name-tag { font-size: 1.4rem; }
            .success-card h1 { font-size: 2rem; }
            .success-card p { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="floating-hearts" id="floatingHearts"></div>
<div class="white-flash" id="whiteFlash"></div>

<div class="card" id="mainCard">
    <div class="love-header">
        <div class="big-heart">❤️❤️❤️</div>
        <div class="glow-520">5 2 0</div>
        <div class="sub-message">✨ 告 白 日 ✨</div>
    </div>
    <div class="confession-text">
        <p>💌 亲爱的，我喜欢你 💌</p>
    </div>
    <div class="name-tag">✨ 写给 全世界唯一 的 你 ✨</div>
    <div style="margin: 15px 0 5px; font-size: 1.1rem; color: #bf5973;">
        从遇见你的那天起，我的世界星河璀璨。<br>
        余生好长，你最难忘。❤️
    </div>
    <div class="buttons-area" id="buttonContainer">
        <button class="btn btn-yes" id="yesBtn">💖 我愿意 💖</button>
        <button class="btn btn-no" id="noBtn">🙅 不要嘛 🙅</button>
    </div>
    <div class="hint-text">
        🎈 戳“不要嘛”它会调皮地躲开，但永远在视线内～ 点“我愿意”见证最绚烂的表白！
    </div>
</div>

<script>
    (function() {
        // ---------- 背景漂浮爱心 ----------
        const heartsContainer = document.getElementById('floatingHearts');
        const heartEmojis = ['❤️', '💖', '💗', '💓', '💕', '💞', '🌸', '🌹', '✨', '💝'];
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerText = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            const size = Math.random() * 20 + 12;
            heart.style.fontSize = size + 'px';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = Math.random() * 8 + 6 + 's';
            heart.style.animationDelay = Math.random() * 5 + 's';
            heart.style.opacity = Math.random() * 0.4 + 0.2;
            heartsContainer.appendChild(heart);
            heart.addEventListener('animationend', () => heart.remove());
        }
        for (let i = 0; i < 35; i++) setTimeout(() => createFloatingHeart(), i * 180);
        let bgInterval = setInterval(() => { if (!document.querySelector('.success-overlay')) createFloatingHeart(); }, 1800);

        // ---------- DOM 元素 ----------
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const mainCard = document.getElementById('mainCard');
        const flash = document.getElementById('whiteFlash');
        let isConfirmed = false;
        let escapeTimer = null;

        // ---------- 核心工具：计算按钮绝对安全的位置（保证完全可见，且留出边距）----------
        function getSafePosition(btn) {
            // 获取按钮当前尺寸和位置（相对于视口）
            const rect = btn.getBoundingClientRect();
            const w = rect.width;
            const h = rect.height;
            const viewW = window.innerWidth;
            const viewH = window.innerHeight;
            const margin = 12; // 保留边缘间隙
            
            // 允许的 left 范围 (px)
            const minLeft = margin;
            const maxLeft = viewW - w - margin;
            // 允许的 top 范围
            const minTop = margin;
            const maxTop = viewH - h - margin;
            
            // 当前 left, top
            const currentLeft = rect.left;
            const currentTop = rect.top;
            
            // 可偏移的范围（相对于当前位置）
            const dxMin = minLeft - currentLeft;
            const dxMax = maxLeft - currentLeft;
            const dyMin = minTop - currentTop;
            const dyMax = maxTop - currentTop;
            
            return { dxMin, dxMax, dyMin, dyMax };
        }
        
        // ---------- 让 NO 按钮“弹射”到随机远角，但绝对安全 ----------
        function makeNoFlyFar() {
            if (isConfirmed || !noBtn) return;
            // 清除之前的恢复定时器
            if (escapeTimer) clearTimeout(escapeTimer);
            
            // 重置 transform 然后获取实时边界
            noBtn.style.transform = '';
            // 强制同步布局
            void noBtn.offsetHeight;
            
            const range = getSafePosition(noBtn);
            if (!range) return;
            
            // 随机选择飞向哪个角落: 0左上,1右上,2左下,3右下
            const corner = Math.floor(Math.random() * 4);
            let targetX = 0, targetY = 0;
            switch(corner) {
                case 0: targetX = range.dxMin; targetY = range.dyMin; break;
                case 1: targetX = range.dxMax; targetY = range.dyMin; break;
                case 2: targetX = range.dxMin; targetY = range.dyMax; break;
                case 3: targetX = range.dxMax; targetY = range.dyMax; break;
            }
            // 添加小随机扰动（不超过15px）
            targetX += (Math.random() - 0.5) * 20;
            targetY += (Math.random() - 0.5) * 20;
            // 严格限制边界
            targetX = Math.min(range.dxMax, Math.max(range.dxMin, targetX));
            targetY = Math.min(range.dyMax, Math.max(range.dyMin, targetY));
            
            // 应用飞行动画
            noBtn.style.transition = 'transform 0.22s cubic-bezier(0.2, 1.2, 0.4, 1)';
            noBtn.style.transform = `translate(${targetX}px, ${targetY}px)`;
            // 增加小旋转
            const rot = (Math.random() - 0.5) * 12;
            noBtn.style.transform += ` rotate(${rot}deg)`;
            
            // 短暂后去掉旋转，保留位移
            escapeTimer = setTimeout(() => {
                if (noBtn && !isConfirmed) {
                    const match = noBtn.style.transform.match(/translate\(([^,]+),([^)]+)\)/);
                    if (match) {
                        noBtn.style.transform = `translate(${match[1]}, ${match[2]})`;
                    }
                    noBtn.style.transition = 'transform 0.2s ease';
                }
                escapeTimer = null;
            }, 220);
            
            // 调皮文字变换
            const flyWords = ['💨 飞走啦', '⚡ 抓不住', '🌀 太远咯', '🎈 点不到', '✨ 反弹~', '💥 咻~', '🌸 逃走啦'];
            if (Math.random() > 0.4) {
                const original = noBtn.innerText;
                const newWord = flyWords[Math.floor(Math.random() * flyWords.length)];
                noBtn.innerText = newWord;
                setTimeout(() => { if (noBtn && !isConfirmed) noBtn.innerText = '🙅 不要嘛 🙅'; }, 700);
            }
            
            // 溅射爱心粒子
            const rect = noBtn.getBoundingClientRect();
            for (let i = 0; i < 10; i++) {
                const spark = document.createElement('div');
                spark.innerText = ['❤️','💕','💖'][Math.floor(Math.random()*3)];
                spark.style.position = 'fixed';
                spark.style.left = rect.left + rect.width/2 + (Math.random() - 0.5)*30 + 'px';
                spark.style.top = rect.top + rect.height/2 + (Math.random() - 0.5)*30 + 'px';
                spark.style.fontSize = '18px';
                spark.style.pointerEvents = 'none';
                spark.style.zIndex = '9999';
                spark.style.opacity = '0.9';
                spark.style.transition = 'all 0.5s ease-out';
                document.body.appendChild(spark);
                const dx = (Math.random() - 0.5) * 80;
                const dy = (Math.random() - 0.5) * 80 - 30;
                setTimeout(() => {
                    spark.style.transform = `translate(${dx}px, ${dy}px) scale(0.5)`;
                    spark.style.opacity = '0';
                }, 10);
                setTimeout(() => spark.remove(), 600);
            }
            if (navigator.vibrate) navigator.vibrate(20);
            
            // 整体协调特效
            mainCard.classList.add('card-shake');
            setTimeout(() => mainCard.classList.remove('card-shake'), 300);
            yesBtn.classList.add('yes-excited');
            setTimeout(() => yesBtn.classList.remove('yes-excited'), 400);
            // 额外飘几个爱心
            for (let i = 0; i < 6; i++) setTimeout(() => createFloatingHeart(), i * 50);
        }
        
        // ---------- 点 YES 的超级华丽特效 ----------
        function launchSuperEffects() {
            // 1. 全屏白色闪光
            flash.style.opacity = '0.6';
            setTimeout(() => { flash.style.opacity = '0'; }, 150);
            
            // 2. 多重彩带 + 心形烟花
            canvasConfetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#ff5e7e', '#ff3366', '#ff99bb'] });
            setTimeout(() => {
                canvasConfetti({ particleCount: 300, spread: 130, origin: { y: 0.5, x: 0.2 }, startVelocity: 25, colors: ['#ff6b8b', '#ffb3c6'] });
                canvasConfetti({ particleCount: 300, spread: 130, origin: { y: 0.5, x: 0.8 }, startVelocity: 25 });
            }, 150);
            setTimeout(() => {
                canvasConfetti({ particleCount: 500, spread: 110, origin: { y: 0.7 }, startVelocity: 20, decay: 0.9 });
                canvasConfetti({ particleCount: 150, spread: 360, origin: { y: 0.4, x: 0.5 }, startVelocity: 30, colors: ['#ff416c', '#ffd966'] });
            }, 400);
            setTimeout(() => {
                canvasConfetti({ particleCount: 400, spread: 80, origin: { y: 0.5, x: 0.5 }, startVelocity: 18, angle: 90, colors: ['#ff4d6d', '#ffb3ba'] });
            }, 600);
            
            // 心形定制彩带
            canvasConfetti({
                particleCount: 120,
                spread: 70,
                origin: { y: 0.6 },
                startVelocity: 20,
                colors: ['#ff3366', '#ff99cc'],
                shapes: ['heart']
            });
            
            // 3. 爱心雨 (100颗爱心从天而降)
            for (let i = 0; i < 120; i++) {
                setTimeout(() => {
                    const heartRain = document.createElement('div');
                    heartRain.className = 'rain-heart';
                    heartRain.innerText = ['❤️','💖','💗','💓','💕'][Math.floor(Math.random()*5)];
                    heartRain.style.left = Math.random() * 100 + '%';
                    heartRain.style.fontSize = (Math.random() * 25 + 15) + 'px';
                    heartRain.style.animationDuration = (Math.random() * 1.2 + 0.8) + 's';
                    heartRain.style.animationDelay = Math.random() * 0.3 + 's';
                    document.body.appendChild(heartRain);
                    setTimeout(() => heartRain.remove(), 1600);
                }, i * 15);
            }
            
            // 4. 屏幕四周冒大爱心
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const bigHeart = document.createElement('div');
                    bigHeart.innerText = '❤️';
                    bigHeart.style.position = 'fixed';
                    bigHeart.style.left = Math.random() * 100 + '%';
                    bigHeart.style.top = Math.random() * 100 + '%';
                    bigHeart.style.fontSize = '40px';
                    bigHeart.style.opacity = '0.8';
                    bigHeart.style.pointerEvents = 'none';
                    bigHeart.style.zIndex = '9999';
                    bigHeart.style.animation = 'heartbeat 0.6s ease-out';
                    bigHeart.style.transform = 'scale(0)';
                    bigHeart.style.transition = 'transform 0.3s';
                    document.body.appendChild(bigHeart);
                    setTimeout(() => { bigHeart.style.transform = 'scale(1.2)'; }, 10);
                    setTimeout(() => bigHeart.remove(), 800);
                }, i * 60);
            }
        }
        
        // 成功弹窗
        function showSuccess() {
            if (isConfirmed) return;
            isConfirmed = true;
            launchSuperEffects();
            
            const overlay = document.createElement('div');
            overlay.className = 'success-overlay';
            overlay.innerHTML = `
                <div class="success-card">
                    <div class="final-heart">💖💖💖</div>
                    <h1>💘 我们在一起啦 💘</h1>
                    <p>✨ 520 快乐 我的宝贝 ✨</p>
                    <p style="font-size:1.2rem;">从今往后，每一个朝夕，我都陪着你 ❤️</p>
                    <p>🌹 谢谢你，答应了我 🌹</p>
                    <button class="close-success" id="closeSuccessBtn">💞 珍藏此刻 💞</button>
                </div>
            `;
            document.body.appendChild(overlay);
            const closeBtn = document.getElementById('closeSuccessBtn');
            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    overlay.remove();
                    if (yesBtn && noBtn) {
                        yesBtn.disabled = true;
                        noBtn.disabled = true;
                        yesBtn.style.opacity = '0.7';
                        noBtn.style.opacity = '0.5';
                        yesBtn.innerText = '❤️ 我们相爱了 ❤️';
                        noBtn.innerText = '💕 永远甜蜜 💕';
                        noBtn.style.transform = 'translate(0px, 0px)';
                        const finalMsg = document.createElement('div');
                        finalMsg.style.marginTop = '20px';
                        finalMsg.style.fontSize = '1.2rem';
                        finalMsg.style.fontWeight = 'bold';
                        finalMsg.style.color = '#ff3b6f';
                        finalMsg.innerHTML = '✨ 愿往后余生，冷暖有相知 ✨';
                        document.querySelector('.buttons-area')?.after(finalMsg);
                    }
                    clearInterval(bgInterval);
                });
            }
            // 额外连续小烟花
            let count = 0;
            const extraFire = setInterval(() => {
                if (!document.body.contains(overlay)) { clearInterval(extraFire); return; }
                canvasConfetti({ particleCount: 30, spread: 45, origin: { y: 0.8, x: Math.random() }, colors: ['#ff98aa','#ff556c'] });
                count++;
                if (count > 15) clearInterval(extraFire);
            }, 400);
        }
        
        function onYes() {
            if (isConfirmed) return;
            mainCard.style.transform = 'scale(1.02)';
            setTimeout(() => mainCard.style.transform = '', 200);
            showSuccess();
        }
        
        // 绑定 YES 事件
        yesBtn.addEventListener('click', onYes);
        yesBtn.addEventListener('touchstart', (e) => { e.preventDefault(); onYes(); });
        
        // 绑定 NO 的飞走事件（保证不会消失）
        function bindNoEvents() {
            if (!noBtn) return;
            // 鼠标/触摸进入即飞走
            noBtn.addEventListener('mouseenter', () => { if (!isConfirmed) makeNoFlyFar(); });
            noBtn.addEventListener('touchstart', (e) => {
                if (!isConfirmed) {
                    e.preventDefault();
                    makeNoFlyFar();
                }
            });
            // 点击时再飞一次 + 提示
            noBtn.addEventListener('click', (e) => {
                if (isConfirmed) return;
                e.preventDefault();
                e.stopPropagation();
                const tip = document.createElement('div');
                tip.innerText = '💢 点不着吧～ 快按“我愿意”呀！';
                tip.style.position = 'fixed';
                tip.style.bottom = '25%';
                tip.style.left = '50%';
                tip.style.transform = 'translateX(-50%)';
                tip.style.backgroundColor = '#ff88aa';
                tip.style.color = 'white';
                tip.style.padding = '6px 16px';
                tip.style.borderRadius = '40px';
                tip.style.fontSize = '0.9rem';
                tip.style.zIndex = '999';
                tip.style.whiteSpace = 'nowrap';
                document.body.appendChild(tip);
                setTimeout(() => tip.remove(), 1200);
                makeNoFlyFar();
            });
        }
        bindNoEvents();
        
        // 窗口大小改变时，重置NO按钮位置到安全区域（但保留调皮随机偏移）
        window.addEventListener('resize', () => {
            if (!isConfirmed && noBtn) {
                if (escapeTimer) clearTimeout(escapeTimer);
                noBtn.style.transform = '';
                // 稍微随机移动一点点（仍在可视区域内）
                setTimeout(() => {
                    if (noBtn && !isConfirmed) {
                        const safe = getSafePosition(noBtn);
                        if (safe) {
                            let randX = (Math.random() - 0.5) * 40;
                            let randY = (Math.random() - 0.5) * 30;
                            randX = Math.min(safe.dxMax, Math.max(safe.dxMin, randX));
                            randY = Math.min(safe.dyMax, Math.max(safe.dyMin, randY));
                            if (Math.abs(randX) > 5 || Math.abs(randY) > 5) {
                                noBtn.style.transform = `translate(${randX}px, ${randY}px)`;
                            }
                        }
                    }
                }, 30);
            }
        });
        
        // 小爱心跟随光标/手指
        document.body.addEventListener('mousemove', (e) => {
            if (isConfirmed) return;
            if (Math.random() > 0.96) {
                const love = document.createElement('div');
                love.innerText = '❤️';
                love.style.position = 'fixed';
                love.style.left = e.pageX - 10 + 'px';
                love.style.top = e.pageY - 10 + 'px';
                love.style.fontSize = '18px';
                love.style.pointerEvents = 'none';
                love.style.zIndex = '9999';
                love.style.opacity = '0.8';
                love.style.transition = 'all 0.5s ease';
                document.body.appendChild(love);
                setTimeout(() => {
                    love.style.opacity = '0';
                    love.style.transform = 'translateY(-20px) scale(0.5)';
                    setTimeout(() => love.remove(), 500);
                }, 40);
            }
        });
        
        console.log("%c✨ 终极520告白 ✨ 点“不要嘛”它只会调皮但绝不离奇消失，点“我愿意”收获漫天心动！", "color: #ff3366; font-size: 14px; font-weight: bold;");
    })();
</script>
