<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>520 · 心动告白 | 我喜欢你</title>
    <!-- canvas-confetti 轻量彩带库 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动文字，保持整洁 */
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffb6c1 0%, #ff85a1 30%, #ff5e7e 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Poppins', 'Dancing Script', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            cursor: default;
        }

        /* 浮动小爱心背景 (动态生成心形元素) */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart-bg {
            position: absolute;
            font-size: 1.2rem;
            opacity: 0.5;
            animation: floatHeart linear infinite;
            color: #fff3f5;
            text-shadow: 0 0 5px rgba(255, 80, 120, 0.5);
            pointer-events: none;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0.6;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 主卡片容器 */
        .card {
            position: relative;
            z-index: 10;
            max-width: 620px;
            width: 100%;
            background: rgba(255, 248, 245, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 68px 68px 72px 72px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.2), 0 0 0 8px rgba(255, 220, 220, 0.6), 0 0 0 12px rgba(255, 140, 160, 0.3);
            text-align: center;
            padding: 30px 28px 48px;
            transition: all 0.3s ease;
            animation: cardGlow 2s infinite alternate;
        }

        @keyframes cardGlow {
            0% {
                box-shadow: 0 30px 45px rgba(0, 0, 0, 0.2), 0 0 0 8px rgba(255, 220, 220, 0.6), 0 0 0 12px rgba(255, 140, 160, 0.3);
            }
            100% {
                box-shadow: 0 35px 55px rgba(0, 0, 0, 0.25), 0 0 0 10px rgba(255, 200, 200, 0.9), 0 0 0 16px rgba(255, 100, 130, 0.5);
            }
        }

        /* 跳动的大爱心 & 520 数字 */
        .love-header {
            margin-bottom: 20px;
            position: relative;
        }

        .big-heart {
            font-size: 85px;
            display: inline-block;
            animation: heartbeat 1.2s infinite ease-in-out;
            filter: drop-shadow(0 8px 18px rgba(220, 60, 80, 0.4));
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.2); text-shadow: 0 0 15px #ff3366; }
            35% { transform: scale(1.1); }
            45% { transform: scale(1.25); }
            55% { transform: scale(1.1); }
        }

        .glow-520 {
            font-size: 80px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 8px;
            text-shadow: 0 4px 15px rgba(255, 80, 100, 0.3);
            margin: 10px 0 5px;
            animation: textGlow 1.5s infinite alternate;
        }

        @keyframes textGlow {
            from { text-shadow: 0 0 5px #ff99aa; }
            to { text-shadow: 0 0 20px #ff3355, 0 0 5px #ff9999; }
        }

        .sub-message {
            font-size: 1.2rem;
            font-weight: 600;
            color: #b13e5a;
            background: rgba(255, 220, 210, 0.6);
            display: inline-block;
            padding: 5px 18px;
            border-radius: 60px;
            backdrop-filter: blur(2px);
            letter-spacing: 1px;
        }

        /* 告白文字 */
        .confession-text {
            margin: 28px 0 20px;
            font-size: 1.65rem;
            line-height: 1.4;
            font-weight: 600;
            color: #4a2c34;
            font-family: 'Segoe UI', 'Quicksand', 'Dancing Script', cursive;
        }

        .confession-text p {
            background: linear-gradient(120deg, #ffe6e9, #fff0f2);
            display: inline;
            padding: 0 12px;
            border-radius: 50px;
            box-decoration-break: clone;
            -webkit-box-decoration-break: clone;
        }

        .name-tag {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff3b6f;
            display: inline-block;
            margin: 8px 0;
            text-shadow: 2px 2px 10px rgba(255, 100, 130, 0.4);
        }

        /* 按钮区域 (flex 内两个按钮) */
        .buttons-area {
            margin: 35px 0 15px;
            display: flex;
            justify-content: center;
            gap: 35px;
            flex-wrap: wrap;
            position: relative;
            min-height: 100px;  /* 给逃逸预留足够空间 */
        }

        .btn {
            border: none;
            font-size: 1.6rem;
            font-weight: bold;
            padding: 12px 32px;
            border-radius: 56px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.1);
            font-family: inherit;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            will-change: transform;
        }

        .btn-yes {
            background: #ff5c8a;
            color: white;
            border: 2px solid #fff0f0;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .btn-yes:hover {
            background: #ff3366;
            transform: scale(1.05);
            box-shadow: 0 8px 18px rgba(255, 50, 100, 0.4);
        }

        .btn-no {
            background: #d9c7cd;
            color: #4b2e38;
            border: 2px solid #fce4ea;
            transition: transform 0.25s cubic-bezier(0.34, 1.3, 0.55, 1), background 0.2s;
            position: relative;
        }

        .btn-no:hover {
            background: #c2a9b1;
        }

        /* 逃跑专用激烈动画 */
        .no-run {
            transition: transform 0.2s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        /* 成功后的覆盖层+惊喜 */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            animation: fadeIn 0.5s;
            font-family: 'Segoe UI', cursive;
        }

        .success-card {
            background: linear-gradient(145deg, #fff2f5, #ffe0e8);
            border-radius: 70px;
            padding: 40px 30px;
            text-align: center;
            max-width: 90%;
            width: 500px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.3);
            border: 3px solid white;
            animation: bouncePop 0.5s;
        }

        .success-card h1 {
            font-size: 3rem;
            color: #ff3366;
            margin-bottom: 20px;
        }

        .success-card p {
            font-size: 1.6rem;
            font-weight: 500;
            color: #902d47;
            margin: 15px 0;
        }

        .success-card .final-heart {
            font-size: 70px;
            animation: heartbeat 0.8s infinite;
        }

        .close-success {
            margin-top: 28px;
            background: #ff5c8a;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes bouncePop {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 提示小尾巴 */
        .hint-text {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #c0607a;
            background: rgba(255, 245, 240, 0.7);
            border-radius: 50px;
            padding: 6px 16px;
            display: inline-block;
            backdrop-filter: blur(2px);
        }

        /* 响应式调整 —— 完美适配手机端 */
        @media (max-width: 550px) {
            .card {
                padding: 20px 18px 35px;
                border-radius: 48px;
            }
            .glow-520 {
                font-size: 58px;
                letter-spacing: 4px;
            }
            .confession-text {
                font-size: 1.3rem;
            }
            .btn {
                font-size: 1.25rem;
                padding: 10px 22px;
            }
            .buttons-area {
                gap: 20px;
            }
            .big-heart {
                font-size: 65px;
            }
            .name-tag {
                font-size: 1.4rem;
            }
            .success-card h1 {
                font-size: 2rem;
            }
            .success-card p {
                font-size: 1.2rem;
            }
        }

        /* 针对小折叠屏更稳妥 */
        @media (max-width: 400px) {
            .btn {
                font-size: 1rem;
                padding: 8px 18px;
            }
            .glow-520 {
                font-size: 48px;
            }
            .confession-text {
                font-size: 1.1rem;
            }
            .hint-text {
                font-size: 0.75rem;
            }
        }

        /* 额外小动画：按钮反弹时加一个冲击波效果 */
        @keyframes shockWave {
            0% { box-shadow: 0 0 0 0 rgba(255, 80, 120, 0.4); }
            100% { box-shadow: 0 0 0 12px rgba(255, 80, 120, 0); }
        }
        .btn-no:active {
            animation: shockWave 0.3s ease-out;
        }
    </style>
</head>
<body>

<div class="floating-hearts" id="floatingHearts"></div>

<div class="card" id="mainCard">
    <div class="love-header">
        <div class="big-heart">❤️❤️❤️</div>
        <div class="glow-520">5 2 0</div>
        <div class="sub-message">✨ 告 白 日 ✨</div>
    </div>
    
    <div class="confession-text">
        <p>💌 亲爱的，我喜欢你 💌</p>
    </div>
    <div class="name-tag">✨ 写给 全世界唯一 的 你 ✨</div>
    <div style="margin: 15px 0 5px; font-size: 1.1rem; color: #bf5973;">
        从遇见你的那天起，我的世界星河璀璨。<br>
        余生好长，你最难忘。❤️
    </div>
    
    <!-- 按钮区域，逃跑的No就在这里 -->
    <div class="buttons-area" id="buttonContainer">
        <button class="btn btn-yes" id="yesBtn">💖 我愿意 💖</button>
        <button class="btn btn-no no-run" id="noBtn">🙅 不要嘛 🙅</button>
    </div>
    <div class="hint-text">
        🎈 戳一下“不要嘛” → 它会像触电一样弹飞！最后还是得点 💖我愿意💖 哟！
    </div>
</div>

<script>
    (function() {
        // ---------- 飘浮爱心背景生成 ----------
        const heartsContainer = document.getElementById('floatingHearts');
        const heartEmojis = ['❤️', '💖', '💗', '💓', '💕', '💞', '🌸', '🌹', '✨', '💝'];
        
        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            const randomHeart = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            heart.innerText = randomHeart;
            const size = Math.random() * 20 + 12; // 12px - 32px
            heart.style.fontSize = size + 'px';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = Math.random() * 8 + 6 + 's';
            heart.style.animationDelay = Math.random() * 5 + 's';
            heart.style.opacity = Math.random() * 0.4 + 0.2;
            heartsContainer.appendChild(heart);
            
            heart.addEventListener('animationend', () => {
                heart.remove();
            });
        }
        
        for (let i = 0; i < 35; i++) {
            setTimeout(() => createFloatingHeart(), i * 180);
        }
        setInterval(() => {
            if (document.querySelector('.success-overlay') === null) {
                createFloatingHeart();
            }
        }, 1800);
        
        // ---------- DOM 元素 ----------
        const yesButton = document.getElementById('yesBtn');
        const noButton = document.getElementById('noBtn');
        const buttonContainer = document.getElementById('buttonContainer');
        let isConfirmed = false;
        
        // 获取父容器边界（扩展范围，让逃逸更远，支持瞬间飞向角落）
        function getUltraEscapeRange(btn) {
            if (!buttonContainer) return { maxX: 0, maxY: 0, minX: 0, minY: 0 };
            const containerRect = buttonContainer.getBoundingClientRect();
            const btnRect = btn.getBoundingClientRect();
            // 相对父容器偏移基准 (原始未偏移时)
            const relativeLeft = btnRect.left - containerRect.left;
            const relativeTop = btnRect.top - containerRect.top;
            // 扩大逃跑范围系数: 允许飞出父容器边界，但不超过屏幕可视区的边缘（使得看起来飞得很远）
            // 使用窗口边界来限制最大距离，避免按钮飞出屏幕不可交互（但太远也不好，限制在可视区内但尽可能夸张）
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;
            const containerGlobalLeft = containerRect.left;
            const containerGlobalTop = containerRect.top;
            
            // 按钮全局绝对坐标允许范围: 左右上下必须保证按钮有一部分在屏幕内，避免完全消失无法点击
            // 但为了让“飞得很远”感觉，允许靠近边缘，但不超出屏幕外部太离谱，否则用户找不到按钮
            const minGlobalX = 5;
            const maxGlobalX = viewportWidth - btnRect.width - 5;
            const minGlobalY = 5;
            const maxGlobalY = viewportHeight - btnRect.height - 5;
            
            // 当前全局位置（无偏移时的全局位置）
            const originalGlobalLeft = btnRect.left;
            const originalGlobalTop = btnRect.top;
            
            // 偏移量允许的全局极限
            const maxTranslateX = maxGlobalX - originalGlobalLeft;
            const minTranslateX = minGlobalX - originalGlobalLeft;
            const maxTranslateY = maxGlobalY - originalGlobalTop;
            const minTranslateY = minGlobalY - originalGlobalTop;
            
            return {
                minX: minTranslateX,
                maxX: maxTranslateX,
                minY: minTranslateY,
                maxY: maxTranslateY
            };
        }
        
        // 让No按钮产生“应激弹射”效果：飞向随机方向很远的位置，伴随抖动
        function makeNoRunAwayExtreme() {
            if (isConfirmed) return;
            if (!noButton) return;
            
            // 清除当前的transform以获取真实原始位置边界
            noButton.style.transform = 'translate(0px, 0px)';
            // 获取超大偏移范围 (屏幕上可用极限)
            const range = getUltraEscapeRange(noButton);
            if (!range) return;
            
            // 随机策略：极大概率飞向远角，增加刺激感
            // 产生激烈偏移: 偏向某个极端方向
            let targetX, targetY;
            
            // 模式1: 直接飞向一个随机极端角落 (大幅偏移)
            const corner = Math.floor(Math.random() * 4); // 0左上 1右上 2左下 3右下
            switch(corner) {
                case 0: // 左上
                    targetX = range.minX;
                    targetY = range.minY;
                    break;
                case 1: // 右上
                    targetX = range.maxX;
                    targetY = range.minY;
                    break;
                case 2: // 左下
                    targetX = range.minX;
                    targetY = range.maxY;
                    break;
                case 3: // 右下
                    targetX = range.maxX;
                    targetY = range.maxY;
                    break;
                default:
                    targetX = (Math.random() > 0.5 ? range.maxX : range.minX);
                    targetY = (Math.random() > 0.5 ? range.maxY : range.minY);
            }
            // 额外增加小随机性，让每次飞的位置不同但依然很远
            targetX += (Math.random() - 0.5) * 25;
            targetY += (Math.random() - 0.5) * 25;
            // 钳位确保不超出范围
            targetX = Math.min(range.maxX, Math.max(range.minX, targetX));
            targetY = Math.min(range.maxY, Math.max(range.minY, targetY));
            
            // 应用弹射位移
            noButton.style.transform = `translate(${targetX}px, ${targetY}px)`;
            
            // 附加趣味特效：让按钮短暂旋转+缩放模拟受击飞走
            noButton.style.transition = 'transform 0.22s cubic-bezier(0.2, 1.5, 0.5, 1)';
            noButton.style.transform += ` rotate(${(Math.random() - 0.5) * 25}deg) scale(0.95)`;
            setTimeout(() => {
                if (noButton && !isConfirmed) {
                    // 恢复旋转并保持位移（位移不变，但还原旋转和缩放，更加自然）
                    noButton.style.transform = `translate(${targetX}px, ${targetY}px)`;
                    noButton.style.transition = 'transform 0.2s cubic-bezier(0.34, 1.2, 0.64, 1)';
                }
            }, 220);
            
            // 更换文字增加趣味感
            const flyTexts = ['💨 飞走啦', '⚡ 抓不住', '✨ 反弹~', '🌀 咻~', '🎈 飘远了', '💥 碰不到', '🌸 逃走咯'];
            if (!isConfirmed && Math.random() > 0.3) {
                const randomMsg = flyTexts[Math.floor(Math.random() * flyTexts.length)];
                const originalText = noButton.innerText;
                noButton.innerText = randomMsg;
                setTimeout(() => {
                    if (noButton && !isConfirmed) noButton.innerText = '🙅 不要嘛 🙅';
                }, 650);
            }
            
            // 额外产生粒子反馈（小爱心溅射）
            createImpactEffect();
        }
        
        // 产生触碰溅射爱心效果（增强视觉反馈）
        function createImpactEffect() {
            if (!noButton) return;
            const rect = noButton.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            for (let i = 0; i < 12; i++) {
                const heartSpark = document.createElement('div');
                heartSpark.innerText = ['❤️','💕','💓','💗'][Math.floor(Math.random()*4)];
                heartSpark.style.position = 'fixed';
                heartSpark.style.left = centerX + (Math.random() - 0.5) * 30 + 'px';
                heartSpark.style.top = centerY + (Math.random() - 0.5) * 30 + 'px';
                heartSpark.style.fontSize = '18px';
                heartSpark.style.pointerEvents = 'none';
                heartSpark.style.zIndex = '9999';
                heartSpark.style.opacity = '0.9';
                heartSpark.style.transition = 'all 0.5s ease-out';
                document.body.appendChild(heartSpark);
                const dx = (Math.random() - 0.5) * 80;
                const dy = (Math.random() - 0.5) * 80 - 30;
                setTimeout(() => {
                    heartSpark.style.transform = `translate(${dx}px, ${dy}px) scale(0.5)`;
                    heartSpark.style.opacity = '0';
                }, 10);
                setTimeout(() => heartSpark.remove(), 600);
            }
            // 轻度震动反馈 (手机)
            if (navigator.vibrate) navigator.vibrate(30);
        }
        
        // 飘浮小提示（适合触摸反馈）
        function showFloatingTip(msg, bgColor = '#ff99bb') {
            const tip = document.createElement('div');
            tip.innerText = msg;
            tip.style.position = 'fixed';
            tip.style.bottom = '20%';
            tip.style.left = '50%';
            tip.style.transform = 'translateX(-50%)';
            tip.style.backgroundColor = bgColor;
            tip.style.color = '#fff';
            tip.style.padding = '10px 20px';
            tip.style.borderRadius = '60px';
            tip.style.fontWeight = 'bold';
            tip.style.fontSize = '1rem';
            tip.style.zIndex = '999';
            tip.style.boxShadow = '0 6px 14px rgba(0,0,0,0.2)';
            tip.style.backdropFilter = 'blur(8px)';
            tip.style.border = '1px solid white';
            tip.style.whiteSpace = 'nowrap';
            tip.style.fontFamily = 'inherit';
            document.body.appendChild(tip);
            setTimeout(() => {
                tip.style.opacity = '0';
                tip.style.transition = 'opacity 0.4s';
                setTimeout(() => tip.remove(), 500);
            }, 1800);
        }
        
        // 触发烟花 / 彩带 (表白成功)
        function launchConfetti() {
            canvasConfetti({ particleCount: 180, spread: 85, origin: { y: 0.6 }, colors: ['#ff5e7e', '#ff3366', '#ff99bb', '#ffccdd'] });
            setTimeout(() => {
                canvasConfetti({ particleCount: 220, spread: 130, origin: { y: 0.5, x: 0.2 }, startVelocity: 22, colors: ['#ff6b8b', '#ffb3c6'] });
                canvasConfetti({ particleCount: 220, spread: 130, origin: { y: 0.5, x: 0.8 }, startVelocity: 22 });
            }, 150);
            setTimeout(() => {
                canvasConfetti({ particleCount: 450, spread: 110, origin: { y: 0.7 }, startVelocity: 18, decay: 0.9 });
                canvasConfetti({ particleCount: 100, spread: 360, origin: { y: 0.4, x: 0.5 }, startVelocity: 28, colors: ['#ff416c', '#ffd966'] });
            }, 400);
            setTimeout(() => {
                canvasConfetti({ particleCount: 350, spread: 70, origin: { y: 0.5, x: 0.5 }, startVelocity: 14, angle: 90, colors: ['#ff4d6d', '#ffb3ba'] });
            }, 700);
        }
        
        // 表白成功界面
        function showSuccessOverlay() {
            if (isConfirmed) return;
            isConfirmed = true;
            
            launchConfetti();
            const overlay = document.createElement('div');
            overlay.className = 'success-overlay';
            overlay.innerHTML = `
                <div class="success-card">
                    <div class="final-heart">💖💖💖</div>
                    <h1>💘 我们在一起啦 💘</h1>
                    <p>✨ 520 快乐 我的宝贝 ✨</p>
                    <p style="font-size:1.2rem;">从今往后，每一个朝夕，我都陪着你 ❤️</p>
                    <p>🌹 谢谢你，答应了我 🌹</p>
                    <button class="close-success" id="closeSuccessBtn">💞 珍藏此刻 💞</button>
                </div>
            `;
            document.body.appendChild(overlay);
            const closeBtn = document.getElementById('closeSuccessBtn');
            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    overlay.remove();
                    if (yesButton && noButton) {
                        yesButton.disabled = true;
                        noButton.disabled = true;
                        yesButton.style.opacity = '0.7';
                        noButton.style.opacity = '0.5';
                        yesButton.innerText = '❤️ 我们相爱了 ❤️';
                        noButton.innerText = '💕 永远甜蜜 💕';
                        noButton.style.transform = 'translate(0px, 0px)';
                        const finalMsg = document.createElement('div');
                        finalMsg.style.marginTop = '20px';
                        finalMsg.style.fontSize = '1.2rem';
                        finalMsg.style.fontWeight = 'bold';
                        finalMsg.style.color = '#ff3b6f';
                        finalMsg.innerHTML = '✨ 愿往后余生，冷暖有相知 ✨';
                        document.querySelector('.buttons-area')?.after(finalMsg);
                    }
                });
            }
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    if (document.body.contains(overlay)) {
                        canvasConfetti({ particleCount: 70, spread: 65, origin: { y: 0.8, x: Math.random() }, colors: ['#ff98aa', '#ff556c'] });
                    }
                }, i * 280);
            }
        }
        
        function onYes() {
            if (isConfirmed) return;
            const card = document.querySelector('.card');
            card.style.transform = 'scale(1.02)';
            setTimeout(() => { if(card) card.style.transform = ''; }, 200);
            showFloatingTip('✨ 我也超喜欢你！ 我们在一起吧 ✨', '#ff6680');
            showSuccessOverlay();
        }
        
        // 绑定YES事件
        yesButton.addEventListener('click', onYes);
        yesButton.addEventListener('touchstart', (e) => {
            e.preventDefault();
            onYes();
        });
        
        // 给NO按钮绑定极端逃跑事件 (鼠标/触摸)
        function bindExtremeEscape() {
            if (!noButton) return;
            // 鼠标进入也是触发逃跑（应激反应）
            noButton.addEventListener('mouseenter', function() {
                if (!isConfirmed) makeNoRunAwayExtreme();
            });
            // 移动端触摸逃逸
            noButton.addEventListener('touchstart', function(e) {
                if (!isConfirmed) {
                    e.preventDefault();
                    makeNoRunAwayExtreme();
                }
            });
            // 点击事件（即使点中了也要弹飞并提示）
            noButton.addEventListener('click', function(e) {
                if (isConfirmed) return;
                e.preventDefault();
                e.stopPropagation();
                showFloatingTip('⚡ 咻~ 飞走咯！点 “我愿意” 表白吧 ⚡', '#ff88aa');
                makeNoRunAwayExtreme();
                // 额外弹飞动画加强
                noButton.style.transition = 'transform 0.18s cubic-bezier(0.2, 1.8, 0.4, 1)';
                setTimeout(() => {
                    if (noButton && !isConfirmed) noButton.style.transition = 'transform 0.2s cubic-bezier(0.34, 1.2, 0.64, 1)';
                }, 250);
            });
        }
        
        bindExtremeEscape();
        
        // 窗口尺寸变化重置逃跑边界 (防止按钮飞越界之后无法复位)
        window.addEventListener('resize', () => {
            if (!isConfirmed && noButton) {
                // 避免飞出太离谱，重新计算范围内合理偏移但保持趣味性，可重置原位移再随机轻微逃逸
                noButton.style.transform = 'translate(0px, 0px)';
                setTimeout(() => {
                    if (noButton && !isConfirmed) {
                        // 尺寸变化后，给它一个微小挑衅，但不用飞太远，避免一加载就飞走
                        if (Math.random() > 0.6) makeNoRunAwayExtreme();
                    }
                }, 50);
            }
        });
        
        // 小爱心跟随特效（鼠标/手指滑过）
        document.body.addEventListener('mousemove', (e) => {
            if (isConfirmed) return;
            if (Math.random() > 0.94) {
                const loveSpan = document.createElement('div');
                loveSpan.innerText = '❤️';
                loveSpan.style.position = 'fixed';
                loveSpan.style.left = e.pageX - 10 + 'px';
                loveSpan.style.top = e.pageY - 10 + 'px';
                loveSpan.style.fontSize = '18px';
                loveSpan.style.pointerEvents = 'none';
                loveSpan.style.zIndex = '9999';
                loveSpan.style.opacity = '0.8';
                loveSpan.style.transition = 'all 0.6s ease';
                document.body.appendChild(loveSpan);
                setTimeout(() => {
                    loveSpan.style.opacity = '0';
                    loveSpan.style.transform = 'translateY(-20px) scale(0.5)';
                    setTimeout(() => loveSpan.remove(), 700);
                }, 50);
            }
        });
        
        console.log("%c💥 超级弹跳版520告白 —— 点“不要嘛”会飞超远！快来牵手吧 💥", "color: #ff3366; font-size: 14px; font-weight: bold;");
    })();
</script>
</body>
</html>
